<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠💀 PREDIKSI STUNTING BRAINROT EDITION 💀🧠</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Creepster&family=Nosifer&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff0000, #0000ff);
            background-size: 400% 400%;
            animation: brainrotGlitch 3s ease infinite;
            font-family: 'Comic Neue', cursive;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }
        
        @keyframes brainrotGlitch {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        body::before {
            content: "💀STUNTING DETECTOR 9000💀";
            position: fixed;
            top: -50px;
            left: -50px;
            font-size: 4rem;
            font-family: 'Nosifer', cursive;
            color: #ff00ff;
            animation: floatSkull 6s ease-in-out infinite;
            z-index: 10;
            text-shadow: 0 0 20px #00ffff;
            pointer-events: none;
        }
        
        @keyframes floatSkull {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(50px, 20px) rotate(180deg); }
            50% { transform: translate(100px, -30px) rotate(360deg); }
            75% { transform: translate(-20px, 50px) rotate(540deg); }
        }
        
        h2 {
            font-family: 'Creepster', cursive;
            font-size: 3.5rem;
            text-align: center;
            margin: 20px 0;
            background: linear-gradient(45deg, #ff00ff, #00ff00, #ffff00, #ff0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowText 2s linear infinite;
            text-shadow: 3px 3px 0 #000, 0 0 20px #fff;
            filter: drop-shadow(0 0 10px #ff00ff);
        }
        
        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        
        form {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px;
            background: rgba(0,0,0,0.8);
            border: 5px solid;
            border-image: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00) 1;
            border-radius: 25px;
            box-shadow: 
                0 0 50px #ff00ff,
                inset 0 0 50px rgba(0,255,255,0.3),
                0 0 100px #00ff00;
            animation: formShake 0.5s infinite alternate;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes formShake {
            0% { transform: translateX(0) rotate(1deg); }
            100% { transform: translateX(5px) rotate(-1deg); }
        }
        
        input, select {
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            font-size: 1.5rem;
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(45deg, #ff1493, #00bfff);
            border: 3px solid #fff;
            border-radius: 15px;
            color: #000;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        input:focus, select:focus {
            outline: none;
            transform: scale(1.05);
            box-shadow: 
                0 0 30px #ff00ff,
                0 5px 20px rgba(0,0,0,0.7);
            animation: inputPulse 0.5s ease;
        }
        
        @keyframes inputPulse {
            0% { box-shadow: 0 0 30px #ff00ff; }
            50% { box-shadow: 0 0 50px #00ffff, 0 0 30px #ff00ff; }
            100% { box-shadow: 0 0 30px #ff00ff; }
        }
        
        button {
            width: 100%;
            padding: 25px;
            font-size: 2rem;
            font-family: 'Creepster', cursive;
            background: linear-gradient(45deg, #ff0000, #ff00ff, #ffff00, #00ff00);
            background-size: 300% 300%;
            border: none;
            border-radius: 20px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: buttonGlitch 1s ease infinite;
            box-shadow: 
                0 10px 30px rgba(255,0,0,0.7),
                inset 0 0 20px rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
            text-shadow: 2px 2px 4px #fff;
        }
        
        @keyframes buttonGlitch {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            25% { transform: scale(1.02); }
            75% { transform: scale(0.98); }
        }
        
        button:hover {
            transform: scale(1.1);
            box-shadow: 
                0 15px 40px rgba(255,0,255,1),
                inset 0 0 30px rgba(255,255,255,0.5);
            animation: none;
        }
        
        button:active {
            transform: scale(0.95);
            animation: explode 0.1s ease;
        }
        
        @keyframes explode {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(0.95); }
        }
        
        h3 {
            font-family: 'Nosifer', cursive;
            font-size: 3rem;
            text-align: center;
            margin-top: 40px;
            color: #ff00ff;
            text-shadow: 
                0 0 20px #00ffff,
                3px 3px 0 #000;
            animation: predictionFlicker 0.3s infinite alternate;
            filter: drop-shadow(0 0 15px #ffff00);
        }
        
        @keyframes predictionFlicker {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }
        
        /* PARTICLE EFFECTS */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffff00;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 4s linear infinite;
        }
        
        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            h2 { font-size: 2.5rem; }
            form { margin: 20px; padding: 30px 20px; }
            input, select, button { font-size: 1.2rem; padding: 15px; }
        }
        
        /* EXTRA BRAINROT */
        .glitch::after {
            content: 'ERROR 404 NUTRITION NOT FOUND';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
            color: #ff0000;
            animation: glitchText 2s linear infinite;
        }
        
        @keyframes glitchText {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); color: #00ffff; }
            40% { transform: translate(-2px, -2px); color: #ffff00; }
            60% { transform: translate(2px, 2px); color: #ff00ff; }
            80% { transform: translate(2px, -2px); color: #00ff00; }
        }
    </style>
</head>
<body>
    <div class="glitch"></div>
    
    <!-- PARTICLE SYSTEM -->
    <script>
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDelay = Math.random() * 2 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 5000);
        }
        
        setInterval(createParticle, 300);
    </script>
    
    <h2>🧠💀 CEK STATUS GIZI BALITA BRAINROT 💀🧠</h2>
    <form action="/predict" method="post">
        <input type="number" name="umur" placeholder="UMUR (BULAN) 💀" required><br>
        
        <select name="jenis_kelamin">
            <option value="laki-laki">👦 LAKI-LAKI ALPHA</option>
            <option value="perempuan">👧 PEREMPUAN GAMER</option>
        </select><br>
        
        <input type="number" name="tinggi" placeholder="TINGGI BADAN (CM) 📏" step="0.1" required><br>
        
        <button type="submit">🚀 PREDIKSI STUNTING ULTRA 💥</button>
    </form>

    <h3>{{ prediction_text }}</h3>
</body>
</html>
